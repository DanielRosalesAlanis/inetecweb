<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portafolios InetecIA</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <span class="brand">InetecIA</span>
      <span class="tagline">Portafolios del grupo</span>
    </div>
  </header>

  <main class="container">
    <section class="intro">
      <h1>Perfiles</h1>
      <p>Selecciona un perfil para ver el portafolio de cada quien.</p>
    </section>

    <section class="profiles" id="profiles">
      <!-- Las tarjetas se generan dinámicamente en app.js -->
    </section>
  </main>

  <footer class="footer">
    <p>Cada alumno programa su propio portafolio dentro de su carpeta.</p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
